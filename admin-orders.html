<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --blue:#0079b0;--blue-light:#0096d6;--blue-dark:#005a82;
    --black:#000;--white:#fff;--gray:#111;--gray2:#1a1a1a;
    --text-muted:#777;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#090909;color:var(--white);min-height:100vh;}

  .layout{display:flex;min-height:100vh;}
  .sidebar{
    width:220px;flex-shrink:0;
    background:linear-gradient(180deg,#000,#0a1520);
    border-right:1px solid #1a1a1a;
    display:flex;flex-direction:column;
    position:fixed;top:0;left:0;bottom:0;z-index:10;
  }
  .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid #1a1a1a;font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:3px;background:linear-gradient(90deg,#fff,#0079b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .sidebar-label{padding:20px 20px 8px;font-size:0.7rem;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;}
  .sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--text-muted);text-decoration:none;font-size:0.9rem;font-weight:500;border-left:3px solid transparent;transition:all 0.2s;}
  .sidebar-link:hover,.sidebar-link.active{color:var(--white);border-left-color:var(--blue);background:rgba(0,121,176,0.1);}
  .sidebar-link.active{color:var(--blue-light);}

  .main{margin-left:220px;padding:32px;flex:1;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:16px;flex-wrap:wrap;}
  .topbar h1{font-family:'Bebas Neue',cursive;font-size:2.2rem;letter-spacing:4px;color:var(--blue-light);}
  .topbar-right{display:flex;gap:12px;align-items:center;}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px;}
  .btn-primary{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;}
  .btn-primary:hover{opacity:0.85;transform:translateY(-1px);}
  .btn-ghost{background:#1a1a1a;color:var(--text-muted);border:1px solid #2a2a2a;}
  .btn-ghost:hover{color:#fff;border-color:#444;}
  .btn-sm{padding:7px 14px;font-size:0.8rem;}
  .btn-success{background:rgba(34,197,94,0.15);color:var(--success);border:1px solid rgba(34,197,94,0.3);}
  .btn-success:hover{background:rgba(34,197,94,0.25);}

  /* SEARCH / FILTER */
  .filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
  .search-input{
    background:#111;border:1px solid #222;border-radius:10px;
    padding:10px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.9rem;
    outline:none;width:260px;transition:border-color 0.2s;
  }
  .search-input:focus{border-color:var(--blue);}
  .filter-select{
    background:#111;border:1px solid #222;border-radius:10px;
    padding:10px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.9rem;
    outline:none;cursor:pointer;
  }

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
  .stat-card{background:linear-gradient(145deg,#111,#161616);border:1px solid #222;border-radius:14px;padding:20px;}
  .stat-label{font-size:0.75rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
  .stat-val{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:2px;color:var(--blue-light);}
  .stat-val.green{color:var(--success);}

  /* TABLE */
  .card{background:linear-gradient(145deg,#111,#161616);border:1px solid #222;border-radius:16px;overflow:hidden;}
  .card-header{padding:20px 24px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
  .card-header h2{font-family:'Bebas Neue',cursive;font-size:1.3rem;letter-spacing:3px;color:var(--text-muted);}
  table{width:100%;border-collapse:collapse;}
  th{padding:12px 20px;text-align:left;font-size:0.75rem;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;border-bottom:1px solid #1a1a1a;}
  td{padding:16px 20px;border-bottom:1px solid #111;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  .order-name{font-weight:600;font-size:0.95rem;margin-bottom:2px;}
  .order-time{font-size:0.78rem;color:var(--text-muted);}
  .order-note{font-size:0.8rem;color:var(--text-muted);font-style:italic;margin-top:4px;}
  .items-list{font-size:0.82rem;color:#aaa;line-height:1.7;}
  .items-list span{display:block;}
  .total-badge{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--blue-light);letter-spacing:1px;}
  .status-badge{
    display:inline-block;padding:4px 12px;border-radius:100px;font-size:0.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  }
  .status-pending_payment{background:rgba(245,158,11,0.15);color:var(--warning);border:1px solid rgba(245,158,11,0.3);}
  .status-paid{background:rgba(34,197,94,0.15);color:var(--success);border:1px solid rgba(34,197,94,0.3);}
  .status-picked_up{background:rgba(0,121,176,0.15);color:var(--blue-light);border:1px solid rgba(0,121,176,0.3);}
  .status-cancelled{background:rgba(239,68,68,0.1);color:#999;border:1px solid #333;}

  .empty-table{text-align:center;padding:60px;color:var(--text-muted);}
  .empty-table .icon{font-size:3rem;margin-bottom:12px;}

  /* ORDER DETAIL PANEL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .detail-panel{
    position:fixed;top:0;right:0;bottom:0;width:480px;
    background:linear-gradient(180deg,#0d0d0d,#111);
    border-left:1px solid #222;z-index:201;
    display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow:-20px 0 60px rgba(0,0,0,0.6);
  }
  .detail-panel.open{transform:translateX(0);}
  .panel-header{padding:24px 20px 20px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;}
  .panel-header h2{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:3px;color:var(--blue-light);}
  .close-btn{background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all 0.2s;line-height:1;}
  .close-btn:hover{color:#fff;background:#222;}
  .panel-body{flex:1;overflow-y:auto;padding:24px;}
  .panel-footer{padding:20px;border-top:1px solid #1a1a1a;}
  .detail-section{margin-bottom:24px;}
  .detail-section h3{font-size:0.75rem;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;}
  .detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #1a1a1a;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .label{font-size:0.85rem;color:var(--text-muted);}
  .detail-row .value{font-size:0.9rem;font-weight:500;text-align:right;max-width:60%;}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #1a1a1a;}
  .item-row:last-child{border-bottom:none;}
  .item-name{font-weight:600;font-size:0.9rem;}
  .item-meta{font-size:0.8rem;color:var(--text-muted);margin-top:2px;}
  .item-sub{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--blue-light);}
  .status-select{
    width:100%;background:#0a0a0a;border:1px solid #333;border-radius:10px;
    padding:12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.9rem;
    outline:none;margin-bottom:12px;cursor:pointer;
  }
  .update-status-btn{
    width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));
    border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;
    font-size:0.9rem;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;
    transition:all 0.2s;
  }
  .update-status-btn:hover{opacity:0.85;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,#0079b0,#005a82);color:#fff;padding:12px 20px;border-radius:12px;font-size:0.9rem;font-weight:500;z-index:999;opacity:0;transform:translateY(20px);transition:all 0.3s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.error{background:linear-gradient(135deg,#7f1d1d,#ef4444);}

  /* LOGIN */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .login-box{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid #222;border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center;}
  .login-box h2{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:4px;color:var(--blue-light);margin-bottom:8px;}
  .login-box p{font-size:0.85rem;color:var(--text-muted);margin-bottom:24px;}
  .login-box input{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:10px;padding:13px 16px;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;margin-bottom:12px;transition:border-color 0.2s;}
  .login-box input:focus{border-color:var(--blue);}
  .login-box button{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;}
  .login-box button:hover{opacity:0.85;}
  #appContent{display:none;}

  /* EXPORT CSV */
  .export-btn{background:rgba(34,197,94,0.1);color:var(--success);border:1px solid rgba(34,197,94,0.2);padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px;}
  .export-btn:hover{background:rgba(34,197,94,0.2);}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Admin Login</h2>
    <p>Orders Management Panel</p>
    <input type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Sign In →</button>
  </div>
</div>

<div id="appContent">
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">🏷️ GS Admin</div>
    <div class="sidebar-label">Navigation</div>
    <a href="admin-products.html" class="sidebar-link">📦 Products</a>
    <a href="admin-orders.html" class="sidebar-link active">🧾 Orders</a>
    <a href="index.html" class="sidebar-link" target="_blank">🛍️ View Store</a>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>Orders</h1>
      <div class="topbar-right">
        <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="loadOrders()">↻ Refresh</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-val" id="statOrders">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Revenue</div>
        <div class="stat-val green" id="statRevenue">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-val" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Picked Up</div>
        <div class="stat-val" id="statPickedUp">—</div>
      </div>
    </div>

    <div class="filters">
      <input class="search-input" id="searchInput" type="text" placeholder="🔍 Search by name..." oninput="filterOrders()"/>
      <select class="filter-select" id="statusFilter" onchange="filterOrders()">
        <option value="">All Statuses</option>
        <option value="pending_payment">Pending Payment</option>
        <option value="paid">Paid</option>
        <option value="picked_up">Picked Up</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>All Orders</h2>
        <span id="orderCount" style="font-size:0.85rem;color:var(--text-muted);">—</span>
      </div>
      <table>
        <thead><tr>
          <th>Buyer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Action</th>
        </tr></thead>
        <tbody id="ordersTableBody">
          <tr><td colspan="6"><div class="empty-table"><div class="icon">⏳</div><p>Loading...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</div>

<!-- ORDER DETAIL PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <h2>Order Detail</h2>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer">
    <select class="status-select" id="newStatus">
      <option value="pending_payment">Pending Payment</option>
      <option value="paid">Paid</option>
      <option value="picked_up">Picked Up</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <button class="update-status-btn" onclick="updateStatus()">Update Status</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>

const ADMIN_PASSWORD = "stella"; // Must match products page

const firebaseConfig = {
  apiKey: "AIzaSyBktRoKG3ELj4Gr3AWPZpD0AErIRm2R-WU",
  authDomain: "gargesale-38b84.firebaseapp.com",
  projectId: "gargesale-38b84",
  storageBucket: "gargesale-38b84.firebasestorage.app",
  messagingSenderId: "915741327833",
  appId: "1:915741327833:web:7be10523abb0eba0dd59c8",
  measurementId: "G-K53XJXMXNE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allOrders = [];
let filtered = [];
let activeOrderId = null;

window.doLogin = function() {
  const pass = document.getElementById("adminPass").value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appContent").style.display = "block";
    loadOrders();
  } else { showToast("Wrong password", true); }
};

window.loadOrders = async function() {
  try {
    const snap = await db.collection("orders").orderBy("createdAt","desc").get();
    allOrders = [];
    snap.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
    filterOrders();
    updateStats();
  } catch(e) {
    // Try without orderBy if index not built yet
    try {
      const snap2 = await db.collection("orders").get();
      allOrders = [];
      snap2.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
      allOrders.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      filterOrders();
      updateStats();
    } catch(e2) { showToast("Failed to load orders", true); }
  }
};

window.filterOrders = function() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  filtered = allOrders.filter(o => {
    const nameMatch = (o.buyerName||"").toLowerCase().includes(search);
    const statusMatch = !status || o.status === status;
    return nameMatch && statusMatch;
  });
  renderTable();
};

function renderTable() {
  const tbody = document.getElementById("ordersTableBody");
  document.getElementById("orderCount").textContent = `${filtered.length} order${filtered.length!==1?'s':''}`;
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-table"><div class="icon">🧾</div><p>No orders found.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(o => {
    const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString() : "—";
    const itemsSummary = (o.items||[]).map(i => `<span>• ${i.name} ×${i.qty}</span>`).join("");
    return `
      <tr style="cursor:pointer;" onclick="openPanel('${o.id}')">
        <td>
          <div class="order-name">${o.buyerName||'Unknown'}</div>
          <div class="order-time">${date}</div>
          ${o.note ? `<div class="order-note">"${o.note}"</div>` : ''}
        </td>
        <td><div class="items-list">${itemsSummary}</div></td>
        <td><span class="total-badge">$${(o.total||0).toFixed(2)}</span></td>
        <td><span class="status-badge status-${o.status||'pending_payment'}">${(o.status||'pending').replace('_',' ')}</span></td>
        <td style="color:#666;font-size:0.82rem;">${date}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openPanel('${o.id}')">View →</button></td>
      </tr>`;
  }).join("");
}

function updateStats() {
  document.getElementById("statOrders").textContent = allOrders.length;
  const revenue = allOrders.filter(o=>o.status==='paid'||o.status==='picked_up').reduce((a,b)=>a+(b.total||0),0);
  document.getElementById("statRevenue").textContent = `$${revenue.toFixed(2)}`;
  document.getElementById("statPending").textContent = allOrders.filter(o=>o.status==='pending_payment'||!o.status).length;
  document.getElementById("statPickedUp").textContent = allOrders.filter(o=>o.status==='picked_up').length;
}

window.openPanel = function(id) {
  activeOrderId = id;
  const o = allOrders.find(x => x.id === id);
  const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString() : "—";

  document.getElementById("newStatus").value = o.status || "pending_payment";

  const itemsHtml = (o.items||[]).map(i => `
    <div class="item-row">
      <div>
        <div class="item-name">${i.name}</div>
        <div class="item-meta">$${(i.price||0).toFixed(2)} × ${i.qty}</div>
      </div>
      <div class="item-sub">$${(i.subtotal||0).toFixed(2)}</div>
    </div>`).join("");

  document.getElementById("panelBody").innerHTML = `
    <div class="detail-section">
      <h3>Buyer Info</h3>
      <div class="detail-row"><span class="label">Name</span><span class="value">${o.buyerName||'—'}</span></div>
      <div class="detail-row"><span class="label">Note</span><span class="value">${o.note||'—'}</span></div>
      <div class="detail-row"><span class="label">Date</span><span class="value">${date}</span></div>
      <div class="detail-row"><span class="label">Status</span><span class="value"><span class="status-badge status-${o.status||'pending_payment'}">${(o.status||'pending').replace('_',' ')}</span></span></div>
    </div>
    <div class="detail-section">
      <h3>Items Ordered</h3>
      ${itemsHtml}
    </div>
    <div class="detail-section">
      <h3>Order Total</h3>
      <div class="detail-row" style="border:none;">
        <span class="label" style="font-size:1rem;">Grand Total</span>
        <span style="font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--blue-light);">$${(o.total||0).toFixed(2)}</span>
      </div>
    </div>`;

  document.getElementById("overlay").classList.add("open");
  document.getElementById("detailPanel").classList.add("open");
};

window.closePanel = function() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("detailPanel").classList.remove("open");
  activeOrderId = null;
};

window.updateStatus = async function() {
  if (!activeOrderId) return;
  const status = document.getElementById("newStatus").value;
  try {
    await db.collection("orders").doc(activeOrderId).update({ status });
    const o = allOrders.find(x => x.id === activeOrderId);
    if (o) o.status = status;
    filterOrders();
    updateStats();
    closePanel();
    showToast("Status updated to: " + status.replace('_',' '));
  } catch(e) { showToast("Failed to update status", true); }
};

window.exportCSV = function() {
  if (!allOrders.length) { showToast("No orders to export", true); return; }
  const rows = [["Order ID","Buyer Name","Note","Items","Total","Status","Date"]];
  allOrders.forEach(o => {
    const itemStr = (o.items||[]).map(i=>`${i.name}x${i.qty}`).join('; ');
    const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString() : "";
    rows.push([o.id, o.buyerName||'', o.note||'', itemStr, (o.total||0).toFixed(2), o.status||'', date]);
  });
  const csv = rows.map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='garage_sale_orders.csv'; a.click();
  showToast("CSV exported!");
};

function showToast(msg, isErr=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isErr?" error":"");
  t.classList.add("show");
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
</body>
</html>
